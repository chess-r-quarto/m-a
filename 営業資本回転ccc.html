<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>営業運転資本 & CCC シミュレーター</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f1f5f9; }
        
        .timeline-container { position: relative; height: 120px; width: 100%; background: #fff; border-radius: 12px; border: 1px solid #e2e8f0; overflow: hidden; }
        .cycle-bar { height: 40px; position: absolute; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.75rem; transition: all 0.3s ease; }
        .connector { position: absolute; border-left: 2px dashed #cbd5e1; height: 100%; top: 0; z-index: 0; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        Babel.registerPreset('tsx', {
            presets: [
                [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
                Babel.availablePresets['react']
            ]
        });
    </script>

    <script type="text/babel" data-presets="tsx">
        const { useState, useEffect, useMemo } = React;

        const App = () => {
            // 基本的なPL項目
            const [annualSales, setAnnualSales] = useState(1200); // 年商 (万円)
            
            // BS項目（営業運転資本の構成要素）
            const [accountsReceivable, setAccountsReceivable] = useState(200); // 売上債権
            const [inventory, setInventory] = useState(150);                // 棚卸資産
            const [accountsPayable, setAccountsPayable] = useState(100);    // 仕入債務

            // 1日あたりの売上高 (365日換算)
            const salesPerDay = annualSales / 365;

            // 回転期間の計算 (日数)
            const arDays = Math.round(accountsReceivable / salesPerDay);
            const invDays = Math.round(inventory / salesPerDay);
            const apDays = Math.round(accountsPayable / salesPerDay);
            
            // 営業運転資本額
            const operatingWorkingCapital = accountsReceivable + inventory - accountsPayable;
            
            // CCC (Cash Conversion Cycle) = 回収期間 + 在庫期間 - 支払猶予期間
            const ccc = arDays + invDays - apDays;

            const formatMoney = (v: number) => `¥${v.toLocaleString()}万`;

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
                        
                        {/* Header */}
                        <div className="bg-indigo-900 text-white p-8">
                            <div className="flex items-center gap-3 mb-2">
                                <div className="p-2 bg-indigo-500 rounded-lg">
                                    <i data-lucide="refresh-cw" className="w-6 h-6"></i>
                                </div>
                                <h1 className="text-3xl font-black">営業運転資本 & CCC 図解</h1>
                            </div>
                            <p className="text-indigo-200 text-lg">「お金が寝ている期間」を可視化して、キャッシュフローの効率を診断しましょう。</p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-0">
                            
                            {/* Inputs Section */}
                            <div className="lg:col-span-4 bg-slate-50 p-8 border-r border-slate-100">
                                <h2 className="text-xl font-bold text-slate-800 mb-6 flex items-center gap-2">
                                    <i data-lucide="settings-2" className="w-5 h-5 text-indigo-600"></i>
                                    財務数値を設定
                                </h2>

                                <div className="space-y-8">
                                    {/* 年商 */}
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-sm">
                                            <label className="font-bold text-slate-700">年商 (Annual Sales)</label>
                                            <span className="text-indigo-600 font-bold">{formatMoney(annualSales)}</span>
                                        </div>
                                        <input type="range" min="100" max="5000" step="100" value={annualSales} onChange={(e) => setAnnualSales(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-indigo-600" />
                                        <p className="text-[10px] text-slate-400">1日あたり: {formatMoney(Math.round(salesPerDay))}</p>
                                    </div>

                                    {/* 売上債権 */}
                                    <div className="space-y-3 pt-4 border-t border-slate-200">
                                        <div className="flex justify-between text-sm">
                                            <label className="font-bold text-blue-600">売上債権 (AR)</label>
                                            <span className="font-bold">{formatMoney(accountsReceivable)}</span>
                                        </div>
                                        <input type="range" min="0" max="1000" step="10" value={accountsReceivable} onChange={(e) => setAccountsReceivable(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-blue-600" />
                                        <div className="flex justify-between text-xs text-blue-500">
                                            <span>回収待ちのお金</span>
                                            <span className="font-bold">期間: {arDays}日</span>
                                        </div>
                                    </div>

                                    {/* 棚卸資産 */}
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-sm">
                                            <label className="font-bold text-orange-600">棚卸資産 (Inventory)</label>
                                            <span className="font-bold">{formatMoney(inventory)}</span>
                                        </div>
                                        <input type="range" min="0" max="1000" step="10" value={inventory} onChange={(e) => setInventory(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-orange-500" />
                                        <div className="flex justify-between text-xs text-orange-500">
                                            <span>在庫として眠るお金</span>
                                            <span className="font-bold">期間: {invDays}日</span>
                                        </div>
                                    </div>

                                    {/* 仕入債務 */}
                                    <div className="space-y-3">
                                        <div className="flex justify-between text-sm">
                                            <label className="font-bold text-emerald-600">仕入債務 (AP)</label>
                                            <span className="font-bold">{formatMoney(accountsPayable)}</span>
                                        </div>
                                        <input type="range" min="0" max="1000" step="10" value={accountsPayable} onChange={(e) => setAccountsPayable(Number(e.target.value))} className="w-full h-2 bg-slate-200 rounded-lg appearance-none cursor-pointer accent-emerald-500" />
                                        <div className="flex justify-between text-xs text-emerald-500">
                                            <span>支払いを待ってもらっているお金</span>
                                            <span className="font-bold">期間: {apDays}日</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Main Visualization Section */}
                            <div className="lg:col-span-8 p-8 flex flex-col space-y-12">
                                
                                {/* Result Summary */}
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                    <div className="bg-indigo-50 border border-indigo-100 p-6 rounded-2xl">
                                        <div className="text-indigo-600 text-sm font-bold mb-1">営業運転資本 (額)</div>
                                        <div className="text-4xl font-black text-indigo-900">{formatMoney(operatingWorkingCapital)}</div>
                                        <p className="text-xs text-indigo-700 mt-2 italic">※AR + 在庫 - AP</p>
                                    </div>
                                    <div className={`p-6 rounded-2xl border ${ccc > 90 ? 'bg-rose-50 border-rose-100' : 'bg-emerald-50 border-emerald-100'}`}>
                                        <div className={`${ccc > 90 ? 'text-rose-600' : 'text-emerald-600'} text-sm font-bold mb-1`}>CCC (現金化サイクル)</div>
                                        <div className={`text-4xl font-black ${ccc > 90 ? 'text-rose-900' : 'text-emerald-900'}`}>{ccc} <span className="text-xl">日</span></div>
                                        <p className="text-xs mt-2 font-medium">手元から現金が消えて戻るまでの日数</p>
                                    </div>
                                </div>

                                {/* Step 1: Component Visualization */}
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                                        <span className="bg-slate-800 text-white w-6 h-6 flex items-center justify-center rounded-full text-xs">1</span>
                                        営業運転資本の構造
                                    </h3>
                                    <div className="relative h-24 flex items-center gap-1 w-full max-w-2xl">
                                        <div className="h-16 bg-blue-500 flex items-center justify-center rounded-l-lg shadow-sm" style={{ flex: accountsReceivable }}>
                                            <span className="text-white font-bold text-xs truncate px-1">売上債権</span>
                                        </div>
                                        <div className="h-16 bg-orange-500 flex items-center justify-center shadow-sm" style={{ flex: inventory }}>
                                            <span className="text-white font-bold text-xs truncate px-1">棚卸資産</span>
                                        </div>
                                        <div className="h-16 bg-slate-200 border-2 border-dashed border-emerald-400 flex items-center justify-center rounded-r-lg" style={{ flex: accountsPayable }}>
                                            <span className="text-emerald-700 font-bold text-xs truncate px-1">△ 仕入債務</span>
                                        </div>
                                    </div>
                                    <div className="mt-4 text-sm text-slate-500 bg-slate-50 p-4 rounded-lg border border-slate-100 italic">
                                        「売上債権」と「棚卸資産」は、会社にとって<strong className="text-slate-700 font-bold underline">まだお金になっていない資産</strong>です。
                                        逆に「仕入債務」は<strong className="text-slate-700 font-bold underline">まだ払わなくていいお金</strong>なので、その差額が「運転資金」として用意すべき金額になります。
                                    </div>
                                </div>

                                {/* Step 2: Cash Conversion Cycle Timeline */}
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                                        <span className="bg-slate-800 text-white w-6 h-6 flex items-center justify-center rounded-full text-xs">2</span>
                                        CCC（キャッシュ・コンバージョン・サイクル）の流れ
                                    </h3>
                                    
                                    <div className="relative mt-12 pb-16">
                                        {/* Timeline Scale */}
                                        <div className="absolute w-full h-1 bg-slate-100 top-[20px]"></div>
                                        
                                        {/* Inventory Days */}
                                        <div className="absolute top-0 flex flex-col items-center" style={{ left: '0%', width: `${(invDays / (invDays + arDays)) * 70}%` }}>
                                            <div className="h-10 w-full bg-orange-400 rounded-md flex items-center justify-center text-white text-[10px] font-bold shadow-md">
                                                在庫期間 {invDays}日
                                            </div>
                                            <div className="text-[10px] mt-2 font-bold text-slate-500">仕入〜販売</div>
                                        </div>

                                        {/* AR Days */}
                                        <div className="absolute top-0 flex flex-col items-center" style={{ left: `${(invDays / (invDays + arDays)) * 70}%`, width: `${(arDays / (invDays + arDays)) * 70}%` }}>
                                            <div className="h-10 w-full bg-blue-500 rounded-md flex items-center justify-center text-white text-[10px] font-bold shadow-md ml-1">
                                                回収期間 {arDays}日
                                            </div>
                                            <div className="text-[10px] mt-2 font-bold text-slate-500">販売〜入金</div>
                                        </div>

                                        {/* AP Days (Offset) */}
                                        <div className="absolute top-16 flex flex-col items-center" style={{ left: '0%', width: `${(apDays / (invDays + arDays)) * 70}%` }}>
                                            <div className="h-10 w-full bg-emerald-500 rounded-md flex items-center justify-center text-white text-[10px] font-bold shadow-md">
                                                支払期間 {apDays}日
                                            </div>
                                            <div className="text-[10px] mt-2 font-bold text-slate-500 italic">仕入〜支払</div>
                                        </div>

                                        {/* CCC Bracket */}
                                        <div className="absolute top-16 flex flex-col items-center" style={{ 
                                            left: `${(apDays / (invDays + arDays)) * 70}%`, 
                                            width: `${((invDays + arDays - apDays) / (invDays + arDays)) * 70}%` 
                                        }}>
                                            <div className="h-10 w-full border-2 border-rose-500 border-t-0 rounded-b-lg flex items-center justify-center text-rose-600 text-xs font-black bg-rose-50/50">
                                                CCC: {ccc}日
                                            </div>
                                            <div className="text-[10px] mt-2 font-bold text-rose-600">この期間、現金が足りない！</div>
                                        </div>
                                    </div>
                                </div>

                                {/* Tips */}
                                <div className="bg-indigo-900 text-indigo-100 p-6 rounded-2xl">
                                    <h4 className="font-bold mb-2 flex items-center gap-2">
                                        <i data-lucide="lightbulb" className="w-4 h-4 text-yellow-400"></i>
                                        経営改善のアドバイス
                                    </h4>
                                    <ul className="text-sm space-y-2 opacity-90">
                                        <li>• <span className="font-bold underline">在庫(Inventory)を減らす</span>：過剰な在庫を持たないことでCCCは短縮されます。</li>
                                        <li>• <span className="font-bold underline">回収(AR)を早める</span>：売掛金の回収を早めれば、手元に早く現金が戻ります。</li>
                                        <li>• <span className="font-bold underline">支払(AP)を遅らせる</span>：仕入先への支払猶予を延ばせば、CCCは改善します。</li>
                                    </ul>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons
        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
