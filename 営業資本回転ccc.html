<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>月商ベース 運転資本・CCCシミュレーター</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <!-- KaTeX for LaTeX rendering -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    <script src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&display=swap');
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f3f4f6; }
        .katex-display { margin: 0.8em 0; overflow-x: auto; }
        .metric-card { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 18px;
            height: 18px;
            background: #2563eb;
            cursor: pointer;
            border-radius: 50%;
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script>
        Babel.registerPreset('tsx', {
            presets: [
                [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
                Babel.availablePresets['react']
            ]
        });
    </script>

    <script type="text/babel" data-presets="tsx">
        const { useState, useEffect, useRef } = React;

        const TeX = ({ formula, block = false }: { formula: string, block?: boolean }) => {
            const containerRef = useRef<HTMLDivElement>(null);
            useEffect(() => {
                if (containerRef.current) {
                    try {
                        katex.render(formula, containerRef.current, {
                            throwOnError: false,
                            displayMode: block
                        });
                    } catch (e) {
                        console.error(e);
                    }
                }
            }, [formula, block]);
            return <div ref={containerRef} className={block ? "my-2" : "inline-block"} />;
        };

        const App = () => {
            // States (初期値: 日本の中小企業の典型的なバランスを想定)
            const [annualSales, setAnnualSales] = useState(1200); // 年商 (万円)
            const [ar, setAr] = useState(200);   // 売上債権 (2ヶ月分想定)
            const [inv, setInv] = useState(100);  // 棚卸資産 (1ヶ月分想定)
            const [ap, setAp] = useState(150);   // 仕入債務 (1.5ヶ月分想定)

            // 月換算の計算
            const monthlySales = annualSales / 12;
            const arMonths = ar / monthlySales;
            const invMonths = inv / monthlySales;
            const apMonths = ap / monthlySales;
            
            // 運転資本（額）と CCC（期間）
            const owc = ar + inv - ap;
            const cccMonths = arMonths + invMonths - apMonths;

            const formatYen = (v: number) => `¥${Math.round(v).toLocaleString()}万`;
            const formatMonth = (v: number) => `${v.toFixed(2)}ヶ月`;

            return (
                <div className="min-h-screen p-4 md:p-10">
                    <div className="max-w-6xl mx-auto space-y-8">
                        
                        {/* Title Section */}
                        <div className="bg-white p-8 rounded-[2rem] shadow-sm border border-slate-200">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-6">
                                <div>
                                    <div className="flex items-center gap-3 mb-2">
                                        <div className="p-2 bg-indigo-600 rounded-xl text-white">
                                            <i data-lucide="bar-chart-big" className="w-7 h-7"></i>
                                        </div>
                                        <h1 className="text-3xl font-black text-slate-800 tracking-tight">月商ベース回転期間アナライザー</h1>
                                    </div>
                                    <p className="text-slate-500 font-medium">経済産業省「ロカベン」・金融機関評価対応モデル</p>
                                </div>
                                <div className="bg-slate-50 px-6 py-4 rounded-2xl border border-slate-100 text-center min-w-[200px]">
                                    <div className="text-[10px] font-black text-slate-400 uppercase tracking-widest mb-1">CCC (Cash Cycle)</div>
                                    <div className={`text-4xl font-black ${cccMonths > 3 ? 'text-rose-600' : 'text-emerald-600'}`}>
                                        {formatMonth(cccMonths)}
                                    </div>
                                </div>
                            </div>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-12 gap-8">
                            
                            {/* Input Panel */}
                            <div className="lg:col-span-4 space-y-6">
                                <div className="bg-white p-6 rounded-[2rem] shadow-sm border border-slate-200 sticky top-10">
                                    <h2 className="text-lg font-bold text-slate-800 mb-6 flex items-center gap-2">
                                        <i data-lucide="settings" className="w-5 h-5 text-indigo-600"></i>
                                        財務データ入力
                                    </h2>

                                    <div className="space-y-8">
                                        <div className="space-y-3">
                                            <div className="flex justify-between text-sm">
                                                <label className="font-bold text-slate-600 underline">年間売上高</label>
                                                <span className="font-mono font-black text-indigo-600">{formatYen(annualSales)}</span>
                                            </div>
                                            <input type="range" min="120" max="6000" step="120" value={annualSales} onChange={(e) => setAnnualSales(Number(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                            <div className="flex justify-between items-center bg-indigo-50 p-2 rounded-lg mt-1">
                                                <span className="text-[10px] font-bold text-indigo-500">平均月商:</span>
                                                <span className="text-xs font-bold text-indigo-700">{formatYen(monthlySales)}</span>
                                            </div>
                                        </div>

                                        <div className="space-y-3 pt-6 border-t border-slate-100">
                                            <div className="flex justify-between text-sm">
                                                <label className="font-bold text-blue-600">売上債権 (AR)</label>
                                                <span className="font-mono font-bold">{formatYen(ar)}</span>
                                            </div>
                                            <input type="range" min="0" max={monthlySales * 6} step="10" value={ar} onChange={(e) => setAr(Number(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                        </div>

                                        <div className="space-y-3 pt-4">
                                            <div className="flex justify-between text-sm">
                                                <label className="font-bold text-orange-500">棚卸資産 (Inventory)</label>
                                                <span className="font-mono font-bold">{formatYen(inv)}</span>
                                            </div>
                                            <input type="range" min="0" max={monthlySales * 6} step="10" value={inv} onChange={(e) => setInv(Number(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                        </div>

                                        <div className="space-y-3 pt-4 pb-4">
                                            <div className="flex justify-between text-sm">
                                                <label className="font-bold text-emerald-600">仕入債務 (AP)</label>
                                                <span className="font-mono font-bold">{formatYen(ap)}</span>
                                            </div>
                                            <input type="range" min="0" max={monthlySales * 6} step="10" value={ap} onChange={(e) => setAp(Number(e.target.value))} className="w-full h-1.5 bg-slate-100 rounded-lg appearance-none cursor-pointer" />
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* Analysis Panel */}
                            <div className="lg:col-span-8 space-y-6">
                                
                                {/* Formula Cards */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200 metric-card">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-3 h-8 bg-blue-600 rounded-full"></div>
                                        <h3 className="text-xl font-black text-slate-800">1. 回転期間の算出 (月換算)</h3>
                                    </div>

                                    <div className="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                                        <div className="p-5 bg-blue-50 rounded-3xl border border-blue-100">
                                            <div className="text-xs font-black text-blue-600 mb-2">売上債権回転期間</div>
                                            <TeX formula={`\\frac{\\text{${ar}}}{\\text{${monthlySales}}} = ${arMonths.toFixed(2)} \\text{ ヶ月}`} block />
                                        </div>
                                        <div className="p-5 bg-orange-50 rounded-3xl border border-orange-100">
                                            <div className="text-xs font-black text-orange-600 mb-2">棚卸資産回転期間</div>
                                            <TeX formula={`\\frac{\\text{${inv}}}{\\text{${monthlySales}}} = ${invMonths.toFixed(2)} \\text{ ヶ月}`} block />
                                        </div>
                                        <div className="p-5 bg-emerald-50 rounded-3xl border border-emerald-100">
                                            <div className="text-xs font-black text-emerald-600 mb-2">仕入債務回転期間</div>
                                            <TeX formula={`\\frac{\\text{${ap}}}{\\text{${monthlySales}}} = ${apMonths.toFixed(2)} \\text{ ヶ月}`} block />
                                        </div>
                                    </div>

                                    <div className="bg-slate-900 text-white p-8 rounded-[2rem] relative overflow-hidden">
                                        <div className="relative z-10">
                                            <h4 className="text-sm font-black text-slate-400 mb-4 flex items-center gap-2">
                                                <i data-lucide="info" className="w-4 h-4"></i>
                                                CCC (Cash Conversion Cycle) の計算式
                                            </h4>
                                            <TeX block formula={`\\text{CCC (ヶ月)} = \\text{売上債権回転期間} + \\text{棚卸資産回転期間} - \\text{仕入債務回転期間}`} />
                                            <div className="flex items-center justify-center gap-4 mt-6 py-4 border-t border-slate-800">
                                                <span className="text-xl font-medium text-slate-400">{arMonths.toFixed(2)} + {invMonths.toFixed(2)} - {apMonths.toFixed(2)} = </span>
                                                <span className={`text-4xl font-black ${cccMonths > 3 ? 'text-rose-400' : 'text-emerald-400'}`}>
                                                    {cccMonths.toFixed(2)} <span className="text-sm font-medium">ヶ月</span>
                                                </span>
                                            </div>
                                        </div>
                                        {/* Background Decoration */}
                                        <div className="absolute bottom-0 right-0 w-48 h-48 bg-indigo-500/20 rounded-full blur-3xl -translate-x-10 -translate-y-10"></div>
                                    </div>
                                </div>

                                {/* Benchmarking Section */}
                                <div className="bg-white p-8 rounded-[2.5rem] shadow-sm border border-slate-200">
                                    <div className="flex items-center gap-3 mb-6">
                                        <div className="w-3 h-8 bg-indigo-600 rounded-full"></div>
                                        <h3 className="text-xl font-black text-slate-800">2. 業界ベンチマーク比較 (経産省ロカベン参照)</h3>
                                    </div>

                                    <div className="space-y-6">
                                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                            <div className="p-6 bg-slate-50 rounded-3xl">
                                                <p className="text-xs font-black text-slate-400 mb-3 tracking-widest uppercase">運転資金（額）の負担</p>
                                                <div className="flex items-baseline gap-2">
                                                    <span className="text-3xl font-black text-slate-800">{formatYen(owc)}</span>
                                                    <span className="text-slate-400 text-sm font-bold">({(owc / monthlySales).toFixed(1)} ヶ月分)</span>
                                                </div>
                                                <p className="text-[10px] text-slate-500 mt-2">※ この金額分だけ、会社は外部から資金を調達して「寝かせておく」必要があります。</p>
                                            </div>
                                            <div className="p-6 bg-slate-50 rounded-3xl">
                                                <p className="text-xs font-black text-slate-400 mb-3 tracking-widest uppercase">資金繰りの健全性</p>
                                                <div className={`text-xl font-black mb-2 ${cccMonths < 1 ? 'text-emerald-600' : cccMonths < 3 ? 'text-indigo-600' : 'text-rose-600'}`}>
                                                    {cccMonths < 1 ? '非常に効率的' : cccMonths < 3 ? '標準的' : '要改善レベル'}
                                                </div>
                                                <div className="w-full bg-slate-200 h-2 rounded-full overflow-hidden flex">
                                                    <div className="bg-emerald-400 h-full" style={{ width: '20%' }}></div>
                                                    <div className="bg-indigo-400 h-full" style={{ width: '40%' }}></div>
                                                    <div className="bg-rose-400 h-full" style={{ width: '40%' }}></div>
                                                </div>
                                                <div className="flex justify-between text-[8px] font-bold text-slate-400 mt-1">
                                                    <span>1ヶ月以内 (優良)</span>
                                                    <span>3ヶ月 (注意)</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="mt-8 p-6 bg-amber-50 rounded-[2rem] border border-amber-100">
                                        <h4 className="font-black text-amber-800 mb-3 flex items-center gap-2 text-sm uppercase tracking-wider">
                                            <i data-lucide="lightbulb" className="w-4 h-4"></i>
                                            月商倍率で見るメリット
                                        </h4>
                                        <ul className="text-xs text-amber-900 space-y-2 font-medium opacity-80 leading-relaxed">
                                            <li>• <strong>「月商の◯ヶ月分」</strong>という表現は、銀行の融資判断（借入限度額など）と直接比較しやすくなります。</li>
                                            <li>• 経産省のローカルベンチマークでは、売上債権や棚卸資産の回転期間が前年より悪化していないかを確認します。</li>
                                            <li>• CCCが3ヶ月を超えてくると、売上が急拡大した際に「黒字倒産」のリスクが高まるため注意が必要です。</li>
                                        </ul>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons
        setTimeout(() => {
            lucide.createIcons();
        }, 200);
    </script>
</body>
</html>
