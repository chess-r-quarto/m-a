<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBITDA 有利子負債倍率 図解シミュレーター</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel Standalone -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { font-family: 'Noto Sans JP', sans-serif; background-color: #f8fafc; }
        .chart-container { display: flex; align-items: flex-end; height: 300px; padding-bottom: 20px; border-bottom: 2px solid #e2e8f0; gap: 1rem; }
        .bar-wrapper { display: flex; flex-direction: column; justify-content: flex-end; align-items: center; width: 100%; height: 100%; position: relative; }
        .bar { width: 100%; border-radius: 4px 4px 0 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: bold; font-size: 0.875rem; transition: height 0.3s ease; overflow: hidden; }
        .bar-label { margin-top: 0.5rem; font-size: 0.875rem; text-align: center; font-weight: 500; color: #475569; }
        
        /* 破線のアニメーション用 */
        .dashed-border { border: 2px dashed #94a3b8; background-color: transparent; color: #475569; }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Babel Configuration for TSX -->
    <script>
        Babel.registerPreset('tsx', {
            presets: [
                [Babel.availablePresets['typescript'], { isTSX: true, allExtensions: true }],
                Babel.availablePresets['react']
            ]
        });
    </script>

    <!-- Application Code -->
    <script type="text/babel" data-presets="tsx">
        const { useState, useEffect } = React;

        const App = () => {
            // State (シミュレーションの初期値)
            const [sales, setSales] = useState(1000);
            const [cashCosts, setCashCosts] = useState(600); // 現金支出を伴う費用(原価+販管費)
            const [depreciation, setDepreciation] = useState(100); // 減価償却費
            const [debt, setDebt] = useState(1200); // 有利子負債

            // 計算ロジック
            const operatingIncome = sales - cashCosts - depreciation;
            const ebitda = operatingIncome + depreciation; // または sales - cashCosts
            const debtToEbitda = ebitda > 0 ? (debt / ebitda).toFixed(1) : '∞';

            // グラフの最大値（描画のスケール用）
            const maxValue = Math.max(sales, debt, 100) * 1.1;

            // 高さを計算するヘルパー
            const getHeight = (val) => `${Math.max((val / maxValue) * 100, 0)}%`;

            // 値のフォーマット
            const formatMoney = (val) => `¥${val.toLocaleString()}`;

            return (
                <div className="min-h-screen p-4 md:p-8">
                    <div className="max-w-6xl mx-auto bg-white rounded-2xl shadow-xl overflow-hidden">
                        
                        {/* ヘッダー */}
                        <div className="bg-slate-800 text-white p-6">
                            <h1 className="text-2xl font-bold flex items-center gap-2">
                                <i data-lucide="bar-chart-3"></i>
                                EBITDA & 有利子負債倍率 図解シミュレーター
                            </h1>
                            <p className="mt-2 text-slate-300 text-sm">
                                PL（損益計算書）の構造から、なぜ減価償却費を足し戻すのかを直感的に理解しましょう。
                            </p>
                        </div>

                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-0 lg:gap-8 p-6">
                            
                            {/* 左側: 入力パネル */}
                            <div className="lg:col-span-1 space-y-6 bg-slate-50 p-6 rounded-xl border border-slate-200">
                                <div>
                                    <h2 className="text-lg font-bold text-slate-800 mb-4 border-b pb-2">会社の状態を入力</h2>
                                    
                                    <div className="space-y-4">
                                        <div className="space-y-1">
                                            <div className="flex justify-between text-sm font-medium">
                                                <label className="text-blue-700">売上高</label>
                                                <span>{formatMoney(sales)}</span>
                                            </div>
                                            <input type="range" min="100" max="2000" step="50" value={sales} onChange={(e) => setSales(Number(e.target.value))} className="w-full accent-blue-600" />
                                        </div>

                                        <div className="space-y-1">
                                            <div className="flex justify-between text-sm font-medium">
                                                <label className="text-slate-600">現金支出費用 <span className="text-xs font-normal text-slate-400">(原価・経費など)</span></label>
                                                <span>{formatMoney(cashCosts)}</span>
                                            </div>
                                            <input type="range" min="0" max={sales} step="50" value={cashCosts} onChange={(e) => setCashCosts(Number(e.target.value))} className="w-full accent-slate-500" />
                                        </div>

                                        <div className="space-y-1">
                                            <div className="flex justify-between text-sm font-medium">
                                                <label className="text-orange-600">減価償却費 <span className="text-xs font-normal text-slate-400">(現金が出ない費用)</span></label>
                                                <span>{formatMoney(depreciation)}</span>
                                            </div>
                                            <input type="range" min="0" max={sales - cashCosts} step="10" value={depreciation} onChange={(e) => setDepreciation(Number(e.target.value))} className="w-full accent-orange-500" />
                                        </div>

                                        <div className="pt-4 mt-4 border-t border-slate-200 space-y-1">
                                            <div className="flex justify-between text-sm font-medium">
                                                <label className="text-red-600">有利子負債 <span className="text-xs font-normal text-slate-400">(借金の総額)</span></label>
                                                <span>{formatMoney(debt)}</span>
                                            </div>
                                            <input type="range" min="0" max="3000" step="100" value={debt} onChange={(e) => setDebt(Number(e.target.value))} className="w-full accent-red-600" />
                                        </div>
                                    </div>
                                </div>

                                {/* 計算結果サマリー */}
                                <div className="bg-white p-4 rounded-lg shadow-sm border border-slate-200 mt-6">
                                    <h3 className="text-sm font-bold text-slate-500 mb-2">計算結果</h3>
                                    <div className="flex justify-between items-end mb-2">
                                        <span className="text-slate-700 font-medium">営業利益:</span>
                                        <span className={`text-lg font-bold ${operatingIncome >= 0 ? 'text-green-600' : 'text-red-600'}`}>
                                            {formatMoney(operatingIncome)}
                                        </span>
                                    </div>
                                    <div className="flex justify-between items-end mb-2">
                                        <span className="text-slate-700 font-bold">EBITDA:</span>
                                        <span className="text-xl font-bold text-teal-600">{formatMoney(ebitda)}</span>
                                    </div>
                                    <div className="flex justify-between items-end mt-4 pt-4 border-t border-slate-100">
                                        <span className="text-slate-700 font-bold text-sm">EBITDA有利子負債倍率:</span>
                                        <span className="text-2xl font-black text-slate-800">{debtToEbitda} <span className="text-sm font-normal text-slate-500">倍 (年)</span></span>
                                    </div>
                                </div>
                            </div>

                            {/* 右側: 図解パネル */}
                            <div className="lg:col-span-2 space-y-8 flex flex-col">
                                
                                {/* 図1: PLとEBITDAの正体 */}
                                <div>
                                    <h3 className="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                                        <span className="bg-blue-100 text-blue-800 px-2 py-1 rounded text-sm">STEP 1</span>
                                        PLからEBITDAを計算する
                                    </h3>
                                    <p className="text-sm text-slate-600 mb-4">
                                        「売上」からすべての費用を引いたものが「営業利益」ですが、<strong className="text-orange-600">減価償却費は実際には現金が出ていっていません</strong>。だから足し戻して「リアルに稼いだ現金（EBITDA）」を計算します。
                                    </p>
                                    
                                    <div className="chart-container bg-slate-50 p-4 rounded-xl border border-slate-200 mt-8 relative">
                                        
                                        {/* 1. 売上高 */}
                                        <div className="bar-wrapper w-1/4">
                                            <div className="bar bg-blue-500" style={{ height: getHeight(sales) }}>
                                                {sales > 100 && formatMoney(sales)}
                                            </div>
                                            <div className="bar-label">売上高</div>
                                        </div>

                                        {/* 2. 費用の内訳 (積み上げ) */}
                                        <div className="bar-wrapper w-1/4">
                                            <div className="bar bg-green-500 rounded-none border-b border-white" style={{ height: Math.max((operatingIncome / maxValue) * 100, 0) + '%' }}>
                                                {operatingIncome > 0 && <span className="text-xs">営業利益 {operatingIncome}</span>}
                                            </div>
                                            <div className="bar bg-orange-400 rounded-none border-b border-white" style={{ height: getHeight(depreciation) }}>
                                                {depreciation > 50 && <span className="text-xs">減価償却費 {depreciation}</span>}
                                            </div>
                                            <div className="bar bg-slate-400 rounded-none" style={{ height: getHeight(cashCosts) }}>
                                                {cashCosts > 100 && <span className="text-xs">現金支出費用 {cashCosts}</span>}
                                            </div>
                                            <div className="bar-label">PLの内訳</div>
                                        </div>

                                        {/* 矢印 */}
                                        <div className="w-1/12 flex items-center justify-center text-slate-400">
                                            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                                        </div>

                                        {/* 3. EBITDA (営業利益 + 減価償却費) */}
                                        <div className="bar-wrapper w-1/3">
                                            {/* ガイドライン */}
                                            <div className="absolute w-full border-t-2 border-dashed border-teal-300 z-0" style={{ bottom: getHeight(ebitda) }}></div>
                                            
                                            <div className="bar bg-teal-500 relative z-10 flex flex-col justify-center" style={{ height: getHeight(ebitda) }}>
                                                <span className="font-bold text-lg">EBITDA</span>
                                                <span className="text-sm">{formatMoney(ebitda)}</span>
                                            </div>
                                            <div className="bar-label font-bold text-teal-700">手元に残る現金<br/>(営業利益＋減価償却費)</div>

                                            {/* 吹き出し */}
                                            <div className="absolute -top-12 bg-white text-xs border border-orange-300 text-orange-700 p-2 rounded shadow-sm whitespace-nowrap z-20">
                                                現金が出ていない<br/>減価償却費を足し戻す！
                                                <div className="absolute bottom-[-6px] left-1/2 transform -translate-x-1/2 w-3 h-3 bg-white border-b border-r border-orange-300 rotate-45"></div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* 図2: 有利子負債との比較 */}
                                <div className="mt-8">
                                    <h3 className="text-lg font-bold text-slate-800 mb-2 flex items-center gap-2">
                                        <span className="bg-red-100 text-red-800 px-2 py-1 rounded text-sm">STEP 2</span>
                                        倍率（返済能力）を確認する
                                    </h3>
                                    <p className="text-sm text-slate-600 mb-4">
                                        計算した「1年で稼げる現金（EBITDA）」のブロックを使って、今の借金（有利子負債）を返すのに何年かかるか（何個ブロックが入るか）を視覚化します。
                                    </p>

                                    <div className="chart-container bg-slate-50 p-4 rounded-xl border border-slate-200 relative" style={{ height: '350px' }}>
                                        
                                        {/* 借金の箱 */}
                                        <div className="bar-wrapper w-1/2 border-r border-slate-300 pr-4">
                                            <div className="bar bg-red-500 relative flex flex-col justify-end pb-4" style={{ height: getHeight(debt) }}>
                                                <span className="font-bold text-lg">借金総額</span>
                                                <span>{formatMoney(debt)}</span>

                                                {/* 中にEBITDAの箱を点線で描画 (視覚的な目安) */}
                                                <div className="absolute bottom-0 left-0 w-full flex flex-col-reverse" style={{ height: '100%' }}>
                                                    {ebitda > 0 && Array.from({ length: Math.ceil(debt / ebitda) }).map((_, i) => (
                                                        <div key={i} className="w-full border-t border-red-400 border-dashed opacity-50 flex items-end justify-center pb-1 text-xs" style={{ height: `${(ebitda / debt) * 100}%`, minHeight: '20px' }}>
                                                            {i + 1}年分
                                                        </div>
                                                    ))}
                                                </div>
                                            </div>
                                            <div className="bar-label text-red-600 font-bold">有利子負債</div>
                                        </div>

                                        {/* = */}
                                        <div className="w-1/12 flex items-center justify-center font-black text-2xl text-slate-400">
                                            ÷
                                        </div>

                                        {/* EBITDA 1年分 */}
                                        <div className="bar-wrapper w-1/3 pl-4">
                                            <div className="bar bg-teal-500 flex flex-col justify-center" style={{ height: getHeight(ebitda) }}>
                                                <span className="font-bold">1年分の稼ぎ</span>
                                                <span className="text-sm">{formatMoney(ebitda)}</span>
                                            </div>
                                            <div className="bar-label text-teal-600 font-bold">EBITDA</div>
                                        </div>

                                        {/* 結果の大きな吹き出し */}
                                        <div className="absolute top-4 right-4 bg-white border-2 border-slate-800 rounded-xl p-4 shadow-lg text-center min-w-[150px]">
                                            <div className="text-sm text-slate-500 font-bold mb-1">計算結果</div>
                                            <div className="text-3xl font-black text-slate-800">{debtToEbitda} <span className="text-lg font-bold">倍</span></div>
                                            <div className={`text-xs mt-2 font-bold px-2 py-1 rounded ${
                                                debtToEbitda <= 5 ? 'bg-green-100 text-green-700' : 
                                                debtToEbitda <= 10 ? 'bg-yellow-100 text-yellow-700' : 
                                                'bg-red-100 text-red-700'
                                            }`}>
                                                {debtToEbitda <= 5 ? '健全（安全圏）' : 
                                                 debtToEbitda <= 10 ? '注意（標準的）' : 
                                                 '警戒（借金多め）'}
                                            </div>
                                        </div>

                                    </div>
                                </div>

                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);

        // Initialize Lucide icons
        setTimeout(() => {
            lucide.createIcons();
        }, 100);
    </script>
</body>
</html>
